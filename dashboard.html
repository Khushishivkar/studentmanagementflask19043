<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
</head>

<body>

<h2>Student Dashboard</h2>

<p><b>Roll No:</b> {{student.rollno}}</p>
<p><b>Name:</b> {{student.username}}</p>
<p><b>Course:</b> {{student.course}}</p>

<h3>Attendance</h3>

<table border="1">
<tr>
<th>Status</th>
<th>Date</th>
</tr>

{% for a in attendance %}
<tr>
<td>{{a.status}}</td>
<td>{{a.date}}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/logout">Logout</a>

</body>
</html>
