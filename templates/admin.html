<h2>Admin Panel</h2>

<h3>Mark Attendance</h3>

<form method="POST">

Roll No<br>
<select name="rollno">

{% for s in students %}
<option value="{{s.rollno}}">
{{s.rollno}} - {{s.username}}
</option>
{% endfor %}

</select>

<br><br>

Status<br>
<select name="status">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>

<br><br>

<button type="submit">Mark Attendance</button>

</form>

<hr>

<h3>Student List</h3>

<table border="1">

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Course</th>
<th>Delete</th>
</tr>

{% for s in students %}

<tr>
<td>{{s.rollno}}</td>
<td>{{s.username}}</td>
<td>{{s.course}}</td>
<td>
<a href="/delete/{{s.rollno}}">Delete</a>
</td>
</tr>

{% endfor %}

</table>

<hr>

<h3>Attendance Records</h3>

<table border="1">

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Status</th>
</tr>

{% for r in records %}

<tr>
<td>{{r.rollno}}</td>
<td>{{r.name}}</td>
<td>{{r.status}}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/logout">Logout</a>
