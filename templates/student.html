<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background-color: #4CAF50;
            overflow: hidden;
            padding: 10px 20px;
            color: white;
        }

        .navbar h2 {
            display: inline-block;
            margin: 0;
        }

        .navbar a {
            float: right;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            background-color: #45a049;
        }

        .navbar a:hover {
            background-color: #3e8e41;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 800px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        table th {
            background-color: #4CAF50;
            color: white;
        }

        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Student Dashboard</h2>
        <a href="/logout">Logout</a>
    </div>

    <div class="container">
        <p>Welcome, {{ session.user }}!</p>

        <h3>Your Attendance</h3>
        <table>
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>
            {% for record in attendance %}
                {% if record.student_id == session.user_id %}
                <tr>
                    <td>{{ record.date }}</td>
                    <td>{{ record.status }}</td>
                </tr>
                {% endif %}
            {% endfor %}
        </table>
    </div>
</body>
</html>
